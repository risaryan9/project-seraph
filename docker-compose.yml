services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: mlviz-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - mlviz-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: mlviz-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
    networks:
      - mlviz-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: mlviz-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - mlviz-network

  influxdb:
    image: influxdb:2.7
    container_name: mlviz-influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_ORG: mlviz
      DOCKER_INFLUXDB_INIT_BUCKET: metrics
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: mlviz-admin-password
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: mlviz-dev-token
    networks:
      - mlviz-network
    volumes:
      - influxdb-data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  topic-bootstrap:
    build: .
    container_name: mlviz-topic-bootstrap
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:9092
    command: python -m mlviz.bootstrap_topics
    networks:
      - mlviz-network
    restart: "no"

  resnet18-train:
    build: .
    container_name: mlviz-resnet18-train
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_ENABLED: "true"
      SAMPLE_INTERVAL_MS: 150
      RUN_SECONDS: 300
    command: python -m mlviz.workloads.resnet_main
    networks:
      - mlviz-network
    cap_add:
      - SYS_ADMIN

  distilbert-infer:
    build: .
    container_name: mlviz-distilbert-infer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_ENABLED: "true"
      SAMPLE_INTERVAL_MS: 150
      RUN_SECONDS: 300
    command: python -m mlviz.workloads.bert_main
    networks:
      - mlviz-network
    cap_add:
      - SYS_ADMIN

  data-pipeline:
    build: .
    container_name: mlviz-data-pipeline
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_ENABLED: "true"
      SAMPLE_INTERVAL_MS: 150
      RUN_SECONDS: 300
    command: python -m mlviz.workloads.pipeline_main
    networks:
      - mlviz-network
    cap_add:
      - SYS_ADMIN

  aggregator:
    build: .
    container_name: mlviz-aggregator
    depends_on:
      kafka:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:9092
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: mlviz-dev-token
      INFLUX_ORG: mlviz
      INFLUX_BUCKET: metrics
    command: python -m mlviz.aggregator.service
    networks:
      - mlviz-network

  live-view:
    build: .
    container_name: mlviz-live-view
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:9092
    command: python -m mlviz.live_view.service
    networks:
      - mlviz-network
    tty: true

  backend:
    build: .
    container_name: mlviz-backend
    depends_on:
      influxdb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:9092
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: mlviz-dev-token
      INFLUX_ORG: mlviz
      INFLUX_BUCKET: metrics
    command: uvicorn mlviz.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    networks:
      - mlviz-network

networks:
  mlviz-network:
    driver: bridge

volumes:
  influxdb-data:
